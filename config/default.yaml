# altobid 默认配置
# 本地覆盖请写入 config/local.yaml（已 gitignore），仅需覆盖差异项。

server:
  host: 127.0.0.1           # 仅本机访问，切勿改 0.0.0.0 或对外暴露
  port: 8799                # 与油猴脚本 ENDPOINT 保持一致

preprocess:
  min_pixels: 262144        # 512*512，视觉 token 下限
  max_pixels: 589824        # 768*768，视觉 token 上限

model:
  path: ./models/Qwen2.5-VL-3B-Instruct
  dtype: fp16               # fp16 / bf16 / fp32；量化时作为 4bit 计算精度
  quantization: nf4         # none（原始 fp16）| nf4（bitsandbytes 4bit，8GB 卡推荐）
  attn: auto                # auto -> flash_attention_2 若可用否则 sdpa
  max_new_tokens: 64
  temperature: 0.1
  top_p: 0.8
  system_prompt: "你是一个网页验证码识别助手。仔细看图并按要求作答，只输出最终答案，不要解释过程、不要单位符号、不要标点。"
  user_prompt: "识别并回答图中的问题，直接给出答案。"

logging:
  level: INFO               # DEBUG | INFO | WARNING | ERROR
  file: ./logs/altobid.log  # 置空则仅控制台
