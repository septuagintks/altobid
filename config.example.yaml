# 本地配置示例——复制为 config/local.yaml 后按需修改（只需写要覆盖的项）。
# 键名与 config/default.yaml 保持一致；此处仅列常改项。

server:
  host: 127.0.0.1          # 仅本机访问，切勿改 0.0.0.0 或对外暴露
  port: 8799               # 与油猴脚本 ENDPOINT 保持一致

model:
  path: ./models/Qwen2.5-VL-7B-Instruct  # 本地权重目录，或 HF 名称
  dtype: fp16              # fp16 / bf16 / fp32（量化时作为 4bit 计算精度）
  quantization: nf4        # none（原始 fp16，建议 24GB+ 显存）| nf4（4bit，12GB 卡推荐）
  max_new_tokens: 64
  temperature: 0.1
  top_p: 0.8
  # system_prompt: "..."   # 自定义 prompt 可覆盖默认（通用验证码识别）
  # user_prompt: "..."     # 无题干时的兜底 user prompt

preprocess:
  min_pixels: 262144       # 512*512
  max_pixels: 589824       # 768*768

logging:
  level: INFO              # DEBUG / INFO / WARNING / ERROR
